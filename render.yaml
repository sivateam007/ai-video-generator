services:
  - type: web
    name: html-to-video
    runtime: image
    repo: https://github.com/YOUR_USERNAME/html-to-video
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false
    buildCommand: ""
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
