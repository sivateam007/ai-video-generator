<!DOCTYPE html>
<html><head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1280px; height: 720px;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    position: relative;
}
.slide {
    width: 1120px; height: 600px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
}
.top-bar {
    background: linear-gradient(90deg, #0c1f33, #125683);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.top-bar .brand {
    display: flex;
    align-items: center;
    gap: 10px;
}
.top-bar .brand img {
    height: 32px;
    width: auto;
    border-radius: 4px;
}
.top-bar .brand .brand-text {
    color: #ffd700;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 1px;
}
.top-bar .topic {
    color: rgba(255,255,255,0.7);
    font-size: 0.8rem;
}
.body-content {
    flex: 1;
    padding: 28px 36px 16px 36px;
    display: flex;
    flex-direction: column;
    background: linear-gradient(160deg, #f5f7fa 0%, #e8ecf1 100%);
    position: relative;
}
.body-content::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(102,126,234,0.06) 0%, transparent 70%);
    pointer-events: none;
}
.title {
    font-size: 2rem;
    font-weight: 800;
    color: #0c1f33;
    margin-bottom: 4px;
    position: relative;
    display: inline-block;
    align-self: flex-start;
}
.title::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 60px; height: 4px;
    background: linear-gradient(90deg, #e24124, #764ba2);
    border-radius: 4px;
}
.subtitle {
    color: #666;
    font-size: 0.9rem;
    font-weight: 500;
    margin-top: 10px;
    margin-bottom: 12px;
}
.cards {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
}
.card {
    padding: 10px 16px 10px 42px;
    background: white;
    border: 1.5px solid #e8ecf1;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    position: relative;
    font-size: 1rem;
    line-height: 1.4;
    color: #2c3e50;
    flex-shrink: 0;
}
.card::before {
    content: '';
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center; justify-content: center;
    font-size: 0.6rem; font-weight: 700; color: #fff;
}
.card:nth-child(1)::before { content: '1'; background: linear-gradient(135deg, #e24124, #e74c3c); }
.card:nth-child(2)::before { content: '2'; background: linear-gradient(135deg, #667eea, #764ba2); }
.card:nth-child(3)::before { content: '3'; background: linear-gradient(135deg, #27ae60, #2ecc71); }
.card:nth-child(4)::before { content: '4'; background: linear-gradient(135deg, #f39c12, #e67e22); }
.card:nth-child(5)::before { content: '5'; background: linear-gradient(135deg, #125683, #0c1f33); }
.code-block {
    padding: 12px 16px;
    background: #1e1e2e;
    border-radius: 12px;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    line-height: 1.5;
    border-left: 4px solid #e24124;
    margin: 6px 0;
    color: #cdd6f4;
    white-space: pre-wrap;
    flex-shrink: 0;
}
.bottom-bar {
    background: linear-gradient(90deg, #0c1f33, #125683);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.bottom-bar .slide-num {
    color: rgba(255,255,255,0.5);
    font-size: 0.75rem;
}
.bottom-bar .tagline {
    color: #7f89d4;
    font-size: 0.75rem;
    font-weight: 600;
}
</style>
</head><body>
<div class="slide">
<div class="top-bar">
<span class="brand">
    <img src="{{ logo_data }}" alt="JT Logo">
    <span class="brand-text">JT Group of Institution</span>
</span>
<span class="topic">{{ topic }}</span>
</div>
<div class="body-content">
<div class="title">{{ title }}</div>
{% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
<div class="cards">
{% for bullet in bullets %}
<div class="card">{{ bullet }}</div>
{% endfor %}
</div>
{% if code %}
<div class="code-block">{{ code }}</div>
{% endif %}
</div>
<div class="bottom-bar">
<span class="slide-num">{{ slide_num }}</span>
<span class="tagline">JT Group of Institution</span>
</div>
</div>
</body></html>
